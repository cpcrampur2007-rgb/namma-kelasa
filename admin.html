<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin-top:100px;
}

.login-box{
width:350px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:12px 25px;
background:#0066cc;
color:white;
border:none;
cursor:pointer;
font-size:16px;
border-radius:5px;
}

button:hover{
background:#004c99;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

table,th,td{
border:1px solid black;
padding:10px;
}

th{
background:#0066cc;
color:white;
}
</style>

</head>

<body>

<div class="login-box" id="login">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none">

<h2>Namma Kelasa Admin Panel</h2>

<p>🎉 Login Successful</p>

<table>

<tr>

<th>Date</th>

<th>Type</th>

<th>Name</th>

<th>Mobile</th>

<th>District</th>

<th>Work</th>

</tr>

</table>

<br>

<button onclick="logout()">Logout</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;

if(u=="admin" && p=="1234"){

document.getElementById("login").style.display="none";

document.getElementById("dashboard").style.display="block";

}else{

alert("Wrong Username or Password");

}

}

function logout(){

location.reload();

}

</script>

</body>
</html>
