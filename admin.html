<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<header>

<h1 id="title">🏠 NAMMA KELASA ADMIN PANEL</h1>
<select id="language" onchange="changeLanguage()">
    <option value="en">English</option>
    <option value="kn">ಕನ್ನಡ</option>
    <option value="hi">हिन्दी</option>
</select>

</header>
<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#0033cc;
color:white;
padding:15px;
text-align:center;
}

.login-box{
width:350px;
margin:50px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#0033cc;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#001f80;
}

#dashboard{
display:none;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:left;
}

th{
background:#0033cc;
color:white;
}

#search{<input id="search" type="text" placeholder="Search Name / Mobile">
width:300px;
padding:10px;
margin:20px 0;
}

</style>
</head>

<body>

<header>

<h1>🏠 NAMMA KELASA ADMIN PANEL</h1>

</header>

<div class="login-box" id="loginBox">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>

<div id="dashboard">

<h2 id="welcome">Welcome Admin</h2>

<input id="search" placeholder="Search Name / Mobile" onkeyup="searchTable()">

<table id="myTable">

<thead>

<tr>

<th>Date</th>
<th>Type</th>
<th>Name</th>
<th>Mobile</th>
<th>District</th>
<th>Work</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<br>

<button id="logoutBtn" onclick="logout()">Logout</button>

</div>

<script>

const url="https://script.google.com/macros/s/AKfycbxPWKjkcIPOt1l57qs6sgb2dvkXAQQqkbNWRJ35oWS9hlHUurG5Gpg1lPVylJrbM5rX/exec";

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u=="admin" && p=="1234"){

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

loadData();

}else{

alert("Wrong Username or Password");

}

}
async function loadData(){

let res=await fetch(url);

let data=await res.json();

let body=document.getElementById("tableBody");

body.innerHTML="";

for(let i=1;i<data.length;i++){

body.innerHTML+=`

<tr>

<td>${data[i][0]}</td>

<td>${data[i][1]}</td>

<td>${data[i][2]}</td>

<td>${data[i][3]}</td>

<td>${data[i][4]}</td>

<td>${data[i][5]}</td>

</tr>

`;

}

}

function searchTable(){

let input=document.getElementById("search").value.toUpperCase();

let rows=document.querySelectorAll("#tableBody tr");

rows.forEach(function(row){

let txt=row.innerText.toUpperCase();

if(txt.indexOf(input)>-1){

row.style.display="";

}else{

row.style.display="none";

}

});

}

function logout()function changeLanguage() {

    let lang = document.getElementById("language").value;

    if(lang=="en"){

        document.getElementById("title").innerHTML="🏠 NAMMA KELASA ADMIN PANEL";
        document.getElementById("welcome").innerHTML="Welcome Admin";
        document.getElementById("search").placeholder="Search Name / Mobile";
        document.getElementById("logoutBtn").innerHTML="Logout";

    }

    else if(lang=="kn"){

        document.getElementById("title").innerHTML="🏠 ನಮ್ಮ ಕೆಲಸ ಆಡ್ಮಿನ್ ಪ್ಯಾನಲ್";
        document.getElementById("welcome").innerHTML="ಸ್ವಾಗತ ಆಡ್ಮಿನ್";
        document.getElementById("search").placeholder="ಹೆಸರು / ಮೊಬೈಲ್ ಹುಡುಕಿ";
        document.getElementById("logoutBtn").innerHTML="ಹೊರನಡೆ";

    }

    else if(lang=="hi"){

        document.getElementById("title").innerHTML="🏠 नम्मा केलसा एडमिन पैनल";
        document.getElementById("welcome").innerHTML="स्वागत एडमिन";
        document.getElementById("search").placeholder="नाम / मोबाइल खोजें";
        document.getElementById("logoutBtn").innerHTML="लॉगआउट";

    }

}{

document.getElementById("dashboard").style.display="none";

document.getElementById("loginBox").style.display="block";

document.getElementById("username").value="";

document.getElementById("password").value="";
<button id="logoutBtn" onclick="logout()">Logout</button>
}

<script>

function changeLanguage(){

    let lang = document.getElementById("language").value;

    if(lang=="en"){
        document.getElementById("title").innerHTML="🏠 NAMMA KELASA ADMIN PANEL";
    }

    else if(lang=="kn"){
        document.getElementById("title").innerHTML="🏠 ನಮ್ಮ ಕೆಲಸ ಆಡ್ಮಿನ್ ಪ್ಯಾನಲ್";
    }

    else if(lang=="hi"){
        document.getElementById("title").innerHTML="🏠 नम्मा केलसा एडमिन पैनल";
    }

}

</script>
</body>

</html>
